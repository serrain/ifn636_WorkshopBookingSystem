name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci 

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://localhost:27017/IFN636_TestDB
          PORT: 5001
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_secret_key' }}
        run: npm test

      - name: Deploy and Restart
        working-directory: ./backend
        run: |
          echo "MONGO_URI=mongodb://localhost:27017/IFN636_ProdDB" > .env
          echo "PORT=5001" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          
          npm ci
          pm2 restart all