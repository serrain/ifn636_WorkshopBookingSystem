name: CI

on:
  push:
    branches: [ "main", "develop", "fix/cd" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: self-hosted

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci 

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://localhost:27017/IFN636_TestDB
          PORT: 5001
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test_secret_key' }}
        run: npm test

      - name: Deploy and Restart
        working-directory: ./backend
        run: |
          npm install
          pm2 restart all